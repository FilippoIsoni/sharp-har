# C2 — cross-entropy + adversary GRL su AR-set, backbone V-B, protocollo P2-office
name: C2
protocol: P2-office
split_file: splits/p2_office.json
backbone: resnet_vb
d_enc: 256
n_att: 8
loss:
  type: ce
  label_smoothing: 0.1
adversary:
  type: grl
  target: ar_set
  lambda_max: 1.0
  beta: null
optim:
  name: adamw
  lr: 1.0e-3
  wd: 1.0e-4
  warmup_epochs: 5
  scheduler: cosine
train:
  epoch_steps: 400
  max_epochs: 40
  batch_size: 256
  sampler: uniform
  amp: true
  grad_clip: 1.0
eval:
  select_metric: val_macro_f1
  patience: 10
