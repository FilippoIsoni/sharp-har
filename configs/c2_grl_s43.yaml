# C2_s43 — E1 seed replicate of C2 (CE + GRL adversary, V-B backbone,
# P2-lab). Byte-identical to c2_grl.yaml except `name` and `seed`
# (42 -> 43). Besides the seed noise floor (see c1_ce_s43.yaml), this
# replicate tests the two C2-specific findings for robustness to
# initialization: does arset_train_acc sit at the train majority floor
# (0.2969) again, and does the val macro-F1 cost vs C1 reproduce?
# Amendment to §0 rule 5 recorded in splits/CHANGELOG.md (E1).
name: C2_s43
seed: 43
protocol: P2-lab
split_file: splits/p2_lab.json
backbone: resnet_vb
d_enc: 256
n_att: 8
loss:
  type: ce
  label_smoothing: 0.1
adversary:
  type: grl
  target: ar_set
  lambda_max: 1.0
  beta: null
optim:
  name: adamw
  lr: 1.0e-3
  wd: 1.0e-4
  warmup_epochs: 5
  scheduler: cosine
train:
  epoch_steps: 400
  max_epochs: 40
  batch_size: 256
  sampler: uniform
  amp: true
  grad_clip: 1.0
eval:
  select_metric: val_macro_f1
  patience: 10
