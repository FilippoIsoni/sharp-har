# C4 — SupCon (phase A) + GRL adversary on AR-set, beta 0.5, P2-lab protocol
# Intermediate checkpoints at epochs 40/50/60; no early stopping in phase A.
# Escalation (a) §5.2 applied 2026-07-16 (phase-A gate NO-GO at 9.16 h,
# reports/gate_day3_phase_a.json): epoch_steps 400 -> 300, same as C3 so
# C3 vs C4 stay directly comparable. See splits/CHANGELOG.md.
name: C4
protocol: P2-lab
split_file: splits/p2_lab.json
backbone: resnet_vb
d_enc: 256
n_att: 8
loss:
  type: supcon+grl
  tau: 0.1
  label_smoothing: null
adversary:
  type: grl
  target: ar_set
  lambda_max: 1.0
  beta: 0.5
optim:
  name: adamw
  lr: 1.0e-3
  wd: 1.0e-4
  warmup_epochs: 5
  scheduler: cosine
train:
  epoch_steps: 300  # escalation (a), §5.2 — see header comment
  max_epochs: 60
  checkpoint_epochs: [40, 50, 60]
  batch_size: 256
  sampler: pxk
  amp: true
  grad_clip: 1.0
eval:
  select_metric: val_macro_f1
  patience: null
