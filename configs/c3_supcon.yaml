# C3 — SupCon (phase A), V-B backbone, P2-lab protocol
# Intermediate checkpoints at epochs 40/50/60; no early stopping in phase A.
# Escalation (a) §5.2 applied 2026-07-16 (phase-A gate NO-GO at 9.16 h,
# reports/gate_day3_phase_a.json): epoch_steps 400 -> 300 for the phase-A
# runs only; C1/C2 passed their gate and stay at 400. Projected phase A
# with the measured 1.373 s/step: 6.87 h <= 8 h. See splits/CHANGELOG.md.
name: C3
protocol: P2-lab
split_file: splits/p2_lab.json
backbone: resnet_vb
d_enc: 256
n_att: 8
loss:
  type: supcon
  tau: 0.1
  label_smoothing: null
adversary:
  type: null
  target: ar_set
  lambda_max: null
  beta: null
optim:
  name: adamw
  lr: 1.0e-3
  wd: 1.0e-4
  warmup_epochs: 5
  scheduler: cosine
train:
  epoch_steps: 300  # escalation (a), §5.2 — see header comment
  max_epochs: 60
  checkpoint_epochs: [40, 50, 60]
  batch_size: 256
  sampler: pxk
  amp: true
  grad_clip: 1.0
eval:
  select_metric: val_macro_f1
  patience: null
