# C1_s43 — E1 seed replicate of C1 (cross-entropy, V-B backbone, P2-lab).
# Byte-identical to c1_ce.yaml except `name` and `seed` (42 -> 43): the
# run-to-run difference measures the pipeline's seed noise floor, the
# empirical calibration of the §0.5 "~2 points = comparable" band.
# Amendment to §0 rule 5 recorded in splits/CHANGELOG.md (E1).
# Techniques/probes stay on seed 42; this run contributes its end-to-end
# numbers and (C1_s43 only) the cached features for the E2 concat control.
name: C1_s43
seed: 43
protocol: P2-lab
split_file: splits/p2_lab.json
backbone: resnet_vb
d_enc: 256
n_att: 8
loss:
  type: ce
  label_smoothing: 0.1
adversary:
  type: null
  target: ar_set
  lambda_max: null
  beta: null
optim:
  name: adamw
  lr: 1.0e-3
  wd: 1.0e-4
  warmup_epochs: 5
  scheduler: cosine
train:
  epoch_steps: 400
  max_epochs: 40
  batch_size: 256
  sampler: uniform
  amp: true
  grad_clip: 1.0
eval:
  select_metric: val_macro_f1
  patience: 10
